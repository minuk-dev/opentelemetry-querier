name: Release

# Build the querier distribution binary automatically and publish it as a
# GitHub Release. Triggered by pushing a semver tag, e.g.:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
on:
  push:
    tags: ["v*"]

# Needed to create the release and upload the built artifacts.
permissions:
  contents: write

env:
  GO_VERSION: "1.25.4"

jobs:
  release:
    name: build & publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      # The distribution lives in ./cmd/querier and builds in workspace mode
      # (see go.work). Go cross-compiles from a single runner, so one job can
      # produce every target archive. CGO is disabled for static binaries.
      - name: build binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for platform in $platforms; do
            os="${platform%/*}"
            arch="${platform#*/}"
            bin="querier"
            [ "$os" = "windows" ] && bin="querier.exe"
            stage="querier_${VERSION}_${os}_${arch}"
            mkdir -p "dist/${stage}"
            echo "::group::build ${platform}"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${stage}/${bin}" ./cmd/querier
            cp LICENSE README.md config.yaml "dist/${stage}/"
            if [ "$os" = "windows" ]; then
              (cd dist && zip -qr "${stage}.zip" "${stage}")
            else
              tar -czf "dist/${stage}.tar.gz" -C dist "${stage}"
            fi
            echo "::endgroup::"
          done
          (cd dist && sha256sum ./*.tar.gz ./*.zip > "checksums_${VERSION}.txt")

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/checksums_*.txt
