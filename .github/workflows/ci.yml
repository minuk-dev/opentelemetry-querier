name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.4"
  GOLANGCI_LINT_VERSION: "v2.11.3"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      # Multi-module workspace: build and test every module (acceptor, processor,
      # dispatcher and their components, plus core).
      - name: build & test all modules
        run: |
          set -euo pipefail
          for gomod in $(find . -name go.mod -not -path './.git/*' | sort); do
            dir=$(dirname "$gomod")
            echo "::group::$dir"
            (cd "$dir" && go build ./... && go test ./...)
            echo "::endgroup::"
          done

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"
      # golangci-lint runs per module; it discovers the shared .golangci.yml at
      # the repository root.
      - name: lint all modules
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          for gomod in $(find . -name go.mod -not -path './.git/*' | sort); do
            dir=$(dirname "$gomod")
            echo "::group::$dir"
            (cd "$dir" && golangci-lint run ./...)
            echo "::endgroup::"
          done

  generate:
    name: generated code is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: regenerate qdata / OTQP and the distribution
        run: |
          buf generate
          go -C cmd/builder run . --config "$PWD/builder.yaml"
      - name: verify no diff
        run: git diff --exit-code
