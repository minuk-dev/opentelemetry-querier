name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.4"
  GOLANGCI_LINT_VERSION: "v2.11.3"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      # Multi-module workspace: build and test every module (acceptor, processor,
      # dispatcher and their components, plus core).
      - name: build & test all modules
        run: |
          set -euo pipefail
          for gomod in $(find . -name go.mod -not -path './.git/*' | sort); do
            dir=$(dirname "$gomod")
            echo "::group::$dir"
            (cd "$dir" && go build ./... && go test ./...)
            echo "::endgroup::"
          done

  # Enumerate every module directory so the lint job below can fan out over them.
  # golangci-lint-action runs one working-directory at a time, so a matrix is the
  # idiomatic way to lint a Go workspace with the official action.
  discover-modules:
    name: discover modules
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.list.outputs.dirs }}
    steps:
      - uses: actions/checkout@v7
      - name: list module directories
        id: list
        run: |
          set -euo pipefail
          dirs=$(find . -name go.mod -not -path './.git/*' -printf '%h\n' \
            | sort | jq -R . | jq -sc .)
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  lint:
    name: golangci-lint
    needs: discover-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.discover-modules.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      # golangci-lint walks up from the module directory and discovers the shared
      # .golangci.yml at the repository root.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.dir }}

  generate:
    name: generated code is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: regenerate qdata / OTQP and the distribution
        run: |
          buf generate
          go run ./cmd/builder --config builder.yaml
      - name: verify no diff
        run: git diff --exit-code
