# Runtime configuration for the OpenTelemetry Querier distribution.
#
# Layout mirrors the opentelemetry-collector: declare component instances under
# acceptors / processors / dispatchers (keyed by component ID, "type" or
# "type/name"), then wire them into named pipelines under service.pipelines.
#
# This is the RUNTIME layer. Which component *types* are available here is fixed
# at build time by builder.yaml.
#
#   Client -> otqp acceptor -> [processors] -> prometheus dispatcher -> storage
#             (results flow back out through the processors in reverse)

acceptors:
  # Default acceptor: OpenTelemetry Query Protocol over gRPC and HTTP.
  otqp:
    grpc_endpoint: "0.0.0.0:4327"
    http_endpoint: "0.0.0.0:4328"

  # Alternative acceptor: the Prometheus HTTP query API (/api/v1/query, ...).
  # Add it to a pipeline's `acceptors` to let Prometheus clients query through
  # the proxy. Each acceptor feeds exactly one pipeline.
  # prometheus:
  #   endpoint: "0.0.0.0:9095"

processors:
  # Gateway: bearer auth + per-tenant rate limiting. Runs first.
  authratelimit:
    require_bearer: true
    tokens:
      - "dev-token"
    requests_per_second: 50
    burst: 100
    per_tenant: true

  # Tenant control: resolve X-Scope-OrgID and register an isolation matcher.
  tenant:
    header: "X-Scope-OrgID"
    default: "anonymous"
    required: false
    enforce_label: "tenant_id"

  # Per-subject authorization: reject a user's query or scope it down. Resolves
  # the subject from X-Scope-User (or the tenant, with from_tenant) and applies
  # the first matching rule; an unmatched subject hits default_effect. Runs
  # after tenant (so from_tenant works) and before queryrewrite (so the injected
  # matchers are enforced). Fails closed — default_effect defaults to deny.
  simpleauthz:
    subject_header: "X-Scope-User"
    default_effect: "deny"
    rules:
      # admins may query anything, unscoped.
      - subjects: ["admin"]
        effect: "allow"
      # alice is allowed, but only within her namespace.
      - subjects: ["alice"]
        effect: "allow"
        enforce_labels:
          - name: "namespace"
            value: "team-a"
      # everyone else with a resolved subject: scope to their own tenant.
      - effect: "allow"
        enforce_labels:
          - name: "tenant_id"
            from_tenant: true

  # Query transformation: inject enforced label matchers into the PromQL AST.
  queryrewrite:
    enforce_labels:
      - name: "tenant_id"
        from_tenant: true

  # Response transformation: drop internal labels, mask secrets, warn on raw
  # cumulative counters returned without rate().
  responsefilter:
    drop_labels:
      - "__internal__"
    mask_labels:
      - "user_email"
    mask_with: "***"
    warn_counter_without_rate: true

dispatchers:
  # Storage backend: an upstream Prometheus-compatible query API.
  prometheus:
    endpoint: "http://localhost:9090"
    tenant_header: "X-Scope-OrgID"
    timeout: 30s

service:
  pipelines:
    query/default:
      acceptors: [otqp]
      processors: [authratelimit, tenant, simpleauthz, queryrewrite, responsefilter]
      dispatchers: [prometheus]
