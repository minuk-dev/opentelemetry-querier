syntax = "proto3";

package opentelemetry.querier.qdata.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Signal is the telemetry signal a query targets (spec §Data Models). The model
// is multi-signal so processors and dispatchers can behave differently per
// signal.
enum Signal {
  SIGNAL_UNSPECIFIED = 0;
  SIGNAL_METRICS = 1;
  SIGNAL_LOGS = 2; // logs + events + wide events (spec §4.0).
  SIGNAL_SPANS = 3;
  SIGNAL_PROFILES = 4;
}

// QueryContext is the evaluation context (spec §Selection / §Contexts). The same
// DSL text is reusable across contexts; time range and step live outside the DSL
// per the spec's recommendation to avoid requiring timestamps in the syntax.
enum QueryContext {
  QUERY_CONTEXT_INSTANT = 0;   // single value per series (Prometheus /query, alerting).
  QUERY_CONTEXT_RANGE = 1;     // windowed values Start..End at Step (/query_range).
  QUERY_CONTEXT_STREAMING = 2; // unbounded stream windowed at Step.
}

// TimeRange is a query time window. Per the spec, Start is inclusive and End
// inclusive by default; the *_exclusive flags allow the (start, end] event
// convention.
message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
  bool start_exclusive = 3;
  bool end_exclusive = 4;
}

// Modifier captures out-of-range fetch adjustments (spec §Out of Range
// Modifiers).
message Modifier {
  // offset shifts the whole window into the past for period-over-period
  // comparison (Prometheus `offset`).
  google.protobuf.Duration offset = 1;
  // lookback is the largest range-selector / sliding window; the dispatcher
  // extends Start backwards by this much so charts are complete.
  google.protobuf.Duration lookback = 2;
}

// MatchOp is a label matcher operator (mirrors PromQL / spec equi-join filters).
enum MatchOp {
  MATCH_OP_EQUAL = 0;
  MATCH_OP_NOT_EQUAL = 1;
  MATCH_OP_REGEXP = 2;
  MATCH_OP_NOT_REGEXP = 3;
}

// LabelMatcher is a single attribute predicate to enforce on a query.
message LabelMatcher {
  string name = 1;
  MatchOp op = 2;
  string value = 3;
}

// BoolOp composes child Predicates into a boolean node. NOT takes exactly one
// operand; AND and OR take one or more.
enum BoolOp {
  BOOL_OP_AND = 0; // deliberate default: an empty combination is a conjunction.
  BOOL_OP_OR = 1;
  BOOL_OP_NOT = 2;
}

// BoolExpr is a boolean combination of child Predicates — the recursive node of
// an enforcement predicate tree (spec §4.2 richer enforcement).
message BoolExpr {
  BoolOp op = 1;
  repeated Predicate operands = 2;
}

// Predicate is one node of an enforcement predicate tree: either a leaf
// LabelMatcher or a boolean combination of child Predicates. It generalizes the
// flat enforced_matchers conjunction to arbitrary AND/OR/NOT composition, for
// dialects whose injector supports it (design note #10, Phase 2). The flat
// enforced_matchers remains the default 90% isolation path.
message Predicate {
  oneof node {
    LabelMatcher leaf = 1;
    BoolExpr bool_expr = 2;
  }
}

// HeaderValues wraps the repeated values of one HTTP header (proto3 maps cannot
// have repeated values directly).
message HeaderValues {
  repeated string values = 1;
}

// Query is the standardized, DSL-agnostic representation of an incoming query.
// An Acceptor produces it, Processors mutate it, a Dispatcher renders it to a
// concrete backend request. expr retains the source DSL so a best-effort proxy
// (spec §4.1) can transpile without a full IR.
message Query {
  Signal signal = 1;
  QueryContext context = 2;
  TimeRange range = 3;
  google.protobuf.Duration step = 4;
  Modifier modifier = 5;

  // 6 (expr) and 7 (dialect) were the DSL-text + language-tag transport; removed
  // in favor of the structured plan (design note #10, Phase 3). The field numbers
  // are reserved so they are never reused.
  reserved 6, 7;
  reserved "expr", "dialect";

  // Tenancy is request-context/transport metadata (Cortex/Mimir/Thanos/Loki
  // X-Scope-OrgID), not a query-language field, so it lives in the metadata map
  // under qdata.MetadataTenantID rather than as a dedicated field here.

  // enforced_matchers are additional label matchers to enforce on the query,
  // AND-ed into every Select of the plan by the query-rewrite processor.
  repeated LabelMatcher enforced_matchers = 8;

  map<string, HeaderValues> header = 9; // inbound request headers.
  map<string, string> metadata = 10;    // processor-to-processor hints.

  // enforced_predicates is the optional richer form of enforced_matchers: a
  // forest of predicate trees (implicitly AND-ed) that supports boolean
  // composition, AND-ed into every Select of the plan. See design note #10.
  repeated Predicate enforced_predicates = 11;

  // plan is the structured, language-neutral query (design note #10, Phase 3 /
  // §4.3 IR). It is the query: acceptors build it from their native query and
  // dispatchers render it to their backend's native query.
  QueryPlan plan = 12;
}

// ---- Structured query IR (design note #10, Phase 3 / §4.3) ----
//
// QueryPlan is the language-neutral logical query — the structured alternative
// to the (expr, dialect) DSL-text pair. Operator coverage is a growing subset;
// a dispatcher that cannot render a node fails closed (CodeInvalidArgument).

// QueryPlan wraps the root operator of the logical query tree.
message QueryPlan {
  Node root = 1;
}

// Node is one logical operator in the plan tree.
message Node {
  oneof op {
    Select select = 1;
    TimeAgg time_agg = 2;
    Aggregate aggregate = 3;
    Function function = 4;
    BinaryOp binary = 5;
    Literal literal = 6;
  }
}

// Select is a leaf operator: it selects a signal and filters it. For metrics it
// selects series; for logs it selects records via the stream filter and any
// line filters.
message Select {
  Signal signal = 1;
  Predicate filter = 2;        // label/attribute selector (reuses Predicate).
  repeated LineMatch line = 3; // logs only: line-content filters.
}

// LineMatch is a log line filter (LogQL |= |~ != !~). op reuses MatchOp: EQUAL
// means "contains", NOT_EQUAL "does not contain", REGEXP / NOT_REGEXP match the
// line against value as a regular expression.
message LineMatch {
  MatchOp op = 1;
  string value = 2;
}

// TimeAgg reduces a range vector over a sliding window (PromQL rate/increase,
// LogQL rate/count_over_time).
message TimeAgg {
  TimeAggOp op = 1;
  google.protobuf.Duration window = 2;
  Node input = 3;
}

enum TimeAggOp {
  TIME_AGG_OP_UNSPECIFIED = 0;
  TIME_AGG_OP_RATE = 1;
  TIME_AGG_OP_INCREASE = 2;
  TIME_AGG_OP_COUNT_OVER_TIME = 3;
  TIME_AGG_OP_SUM_OVER_TIME = 4;
  TIME_AGG_OP_AVG_OVER_TIME = 5;
  TIME_AGG_OP_MIN_OVER_TIME = 6;
  TIME_AGG_OP_MAX_OVER_TIME = 7;
}

// Aggregate groups series by/without labels and reduces them.
message Aggregate {
  AggOp op = 1;
  repeated string by = 2;
  repeated string without = 3;
  double param = 4; // quantile phi in [0,1], or topk/bottomk k.
  Node input = 5;
}

enum AggOp {
  AGG_OP_UNSPECIFIED = 0;
  AGG_OP_SUM = 1;
  AGG_OP_AVG = 2;
  AGG_OP_MIN = 3;
  AGG_OP_MAX = 4;
  AGG_OP_COUNT = 5;
  AGG_OP_QUANTILE = 6;
  AGG_OP_TOPK = 7;
  AGG_OP_BOTTOMK = 8;
  AGG_OP_GROUP = 9;
  AGG_OP_STDDEV = 10;
  AGG_OP_STDVAR = 11;
}

// Function is an instant/scalar function over child nodes. name is open-ended
// (histogram_quantile, abs, clamp, label_replace, ...); a dispatcher that does
// not recognize name fails closed.
message Function {
  string name = 1;
  repeated Node args = 2;
  repeated string string_args = 3; // literal string arguments (e.g. label_replace).
}

// BinaryOp combines two nodes (arithmetic, comparison, set operations).
message BinaryOp {
  BinOp op = 1;
  Node lhs = 2;
  Node rhs = 3;
  VectorMatch matching = 4; // optional vector matching (on/ignoring, group_*).
}

enum BinOp {
  BIN_OP_UNSPECIFIED = 0;
  BIN_OP_ADD = 1;
  BIN_OP_SUB = 2;
  BIN_OP_MUL = 3;
  BIN_OP_DIV = 4;
  BIN_OP_MOD = 5;
  BIN_OP_POW = 6;
  BIN_OP_EQ = 7;
  BIN_OP_NE = 8;
  BIN_OP_GT = 9;
  BIN_OP_LT = 10;
  BIN_OP_GE = 11;
  BIN_OP_LE = 12;
  BIN_OP_AND = 13;
  BIN_OP_OR = 14;
  BIN_OP_UNLESS = 15;
}

// VectorMatch describes how two vectors' series are paired in a BinaryOp
// (PromQL on/ignoring + group_left/group_right). on and ignoring are mutually
// exclusive.
message VectorMatch {
  repeated string on = 1;
  repeated string ignoring = 2;
  MatchCardinality cardinality = 3;
  repeated string include = 4; // group_left/right(<include>) labels to copy.
}

enum MatchCardinality {
  MATCH_CARDINALITY_ONE_TO_ONE = 0;
  MATCH_CARDINALITY_MANY_TO_ONE = 1; // group_left
  MATCH_CARDINALITY_ONE_TO_MANY = 2; // group_right
}

// Literal is a scalar constant.
message Literal {
  double value = 1;
}
